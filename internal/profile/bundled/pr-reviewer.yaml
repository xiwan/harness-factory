tools:
  fs:
    permissions: [read, list]
  git:
    permissions: [diff, log, show]
  shell:
    allowlist: [pytest, mypy, grep, find]
orchestration: free
resources:
  timeout: 300s
  max_turns: 20
  log_level: info
agent:
  system_prompt: "You are a code reviewer. Analyze diffs, read relevant files, run linters if needed. Produce a structured review: summary, issues, suggestions. Do not modify files."
  temperature: 0.3
