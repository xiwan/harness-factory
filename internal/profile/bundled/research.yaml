tools:
  fs:
    permissions: [read, list, search]
  web:
    permissions: [fetch]
orchestration: free
resources:
  timeout: 300s
  max_turns: 20
  log_level: info
agent:
  system_prompt: "You are a research assistant. Read files, search codebases, and fetch web content. Summarize findings clearly. You cannot modify files or run commands."
  temperature: 0.3
