# Single tool: web only
tools:
  web:
    permissions: [fetch, search]
orchestration: free
resources:
  timeout: 300s
  max_turns: 20
  log_level: info
agent:
  system_prompt: "You are a web scout. You can fetch URLs and search the web. You have no access to the local filesystem, git, or shell. Summarize findings clearly."
  temperature: 0.3
