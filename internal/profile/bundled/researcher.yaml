# Dual tool: fs + web
tools:
  fs:
    permissions: [read, list, search]
  web:
    permissions: [fetch, search]
orchestration: free
resources:
  timeout: 300s
  max_turns: 20
  log_level: info
agent:
  system_prompt: "You are a researcher. Read local files and fetch web content to gather information. Summarize findings clearly. You cannot modify files or run commands."
  temperature: 0.3
